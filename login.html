<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Login — National Footwear</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  :root {
    --auth-bg: #f8f9fa;
    --auth-card: #ffffff;
    --auth-accent: #000000;
  }
  body.auth-page {
    background: var(--auth-bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    font-family: 'Plus Jakarta Sans', sans-serif;
  }
  .auth-container {
    width: 100%;
    max-width: 440px;
  }
  .auth-card {
    background: var(--auth-card);
    padding: 48px;
    border-radius: 24px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.04);
    border: 1px solid rgba(0,0,0,0.05);
  }
  .auth-header {
    text-align: center;
    margin-bottom: 32px;
  }
  .auth-logo {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 8px;
    display: inline-block;
    color: var(--auth-accent);
    text-decoration: none;
  }
  .auth-title {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a1a;
    margin-bottom: 8px;
  }
  .auth-subtitle {
    font-size: 14px;
    color: #666;
  }
  .auth-tabs {
    display: flex;
    gap: 20px;
    margin-bottom: 24px;
    border-bottom: 1px solid #eee;
  }
  .auth-tab {
    padding: 12px 4px;
    font-size: 14px;
    font-weight: 600;
    color: #999;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .auth-tab.active {
    color: var(--auth-accent);
    border-color: var(--auth-accent);
  }
  .form-group {
    margin-bottom: 20px;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #333;
  }
  .form-group input {
    width: 100%;
    padding: 14px 16px;
    border-radius: 12px;
    border: 1.5px solid #eee;
    font-size: 15px;
    transition: all 0.2s;
    box-sizing: border-box;
  }
  .form-group input:focus {
    border-color: var(--auth-accent);
    outline: none;
    box-shadow: 0 0 0 4px rgba(0,0,0,0.03);
  }
  .auth-btn {
    width: 100%;
    padding: 16px;
    background: var(--auth-accent);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .auth-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 16px rgba(0,0,0,0.1);
  }
  .auth-footer {
    text-align: center;
    margin-top: 24px;
    font-size: 14px;
  }
  .auth-link {
    color: var(--auth-accent);
    text-decoration: none;
    font-weight: 600;
    cursor: pointer;
  }
  .auth-error {
    background: #FEF2F2;
    color: #B91C1C;
    padding: 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
  }
  .loading-spinner {
    display: none;
    width: 20px;
    height: 20px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    border-top-color: #fff;
    animation: spin 0.8s linear infinite;
    margin-left: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  /* Forgot Password Modal */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center; justify-content: center;
    z-index: 1000;
  }
  .modal-card {
    background: white;
    padding: 32px;
    border-radius: 20px;
    width: 90%; max-width: 400px;
  }
</style>
</head>
<body class="auth-page">

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <a href="index.html" class="auth-logo">NATIONAL</a>
      <div id="loginTitle">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to your account</p>
      </div>
      <div id="signUpTitle" style="display:none">
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Join us for a premium experience</p>
      </div>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="tabLogin" onclick="switchMode('login')">Login</div>
      <div class="auth-tab" id="tabSign" onclick="switchMode('signup')">Sign Up</div>
    </div>

    <div id="authError" class="auth-error"></div>

    <form id="authForm" onsubmit="event.preventDefault(); handleAuth();">
      <div id="signUpFields" style="display:none">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="authName" placeholder="Enter your full name">
        </div>
      </div>
      
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="authEmail" placeholder="you@example.com" required>
      </div>
      
      <div class="form-group">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px">
          <label style="margin:0">Password</label>
          <a class="auth-link" style="font-size:12px" id="forgotPassLink" onclick="openForgotPass()">Forgot?</a>
        </div>
        <input type="password" id="authPass" placeholder="••••••••" required>
      </div>

      <button type="submit" class="auth-btn" id="authBtn">
        <span id="authBtnText">Sign In</span>
        <div class="loading-spinner" id="btnSpinner"></div>
      </button>
    </form>

    <div class="auth-footer">
      <a href="index.html" class="auth-link">← Back to Store</a>
      <div style="margin-top:20px; border-top:1px solid #eee; pt-20">
        <p style="font-size:12px; color:#999; margin-bottom:8px">Business Owner?</p>
        <a href="admin.html" class="auth-link" style="color:var(--accent-dark)">Access Admin Portal →</a>
      </div>
    </div>
  </div>
</div>

<!-- Forgot Password Modal -->
<div class="modal-overlay" id="forgotModal">
  <div class="modal-card">
    <h3 style="margin-top:0">Reset Password</h3>
    <p style="font-size:14px; color:#666; margin-bottom:20px">Enter your email and we'll send you a recovery link.</p>
    <div class="form-group">
      <input type="email" id="resetEmail" placeholder="you@example.com">
    </div>
    <div style="display:flex; gap:12px">
      <button class="auth-btn" style="flex:1" onclick="handleReset()">Send Link</button>
      <button class="auth-btn" style="flex:1; background:#eee; color:#333" onclick="closeForgotPass()">Cancel</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="config.js"></script>
<script src="login.js"></script>

</body>
</html>
